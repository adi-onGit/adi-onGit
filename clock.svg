<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="128" height="128">
  <style>
    .hand { transform-origin: 100px 100px; }
    /* These CSS animations are what make the hands tick and rotate! */
    .hour { animation: spin 43200s linear infinite; }
    .minute { animation: spin 3600s linear infinite; }
    .second { animation: spin 60s steps(60) infinite; }
    
    .sweep { stroke: #fff; stroke-linecap: round; }
    .sec-sweep { stroke: #ff4d4d; stroke-linecap: round; }
    .text { font-family: monospace; font-size: 10px; font-weight: bold; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <!-- Textured Dial Rings (Mathematically calculated to represent 31 days, 12 months, and 7 weekdays!) -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#252525" stroke-width="14" stroke-dasharray="4 13.2" />
  <circle cx="100" cy="100" r="70" fill="none" stroke="#1e1e1e" stroke-width="14" stroke-dasharray="14 22.6" />
  <circle cx="100" cy="100" r="55" fill="none" stroke="#151515" stroke-width="14" stroke-dasharray="20 29.3" />
  
  <!-- Active Text Indicators (Centered Top) -->
  <rect x="91" y="11" width="18" height="12" fill="#0d1117" />
  <rect x="88" y="25" width="24" height="12" fill="#0d1117" />
  <rect x="88" y="40" width="24" height="12" fill="#0d1117" />
  
  <text x="100" y="20" class="text" fill="#ff4d4d" text-anchor="middle">22</text>
  <text x="100" y="34" class="text" fill="#3b82f6" text-anchor="middle">NOV</text>
  <text x="100" y="49" class="text" fill="#22c55e" text-anchor="middle">SAT</text>

  <!-- Solid Center -->
  <circle cx="100" cy="100" r="45" fill="#111" />
  <circle cx="100" cy="100" r="45" fill="none" stroke="#000" stroke-width="2" />

  <!-- Hands -->
  <g class="hand hour">
    <g transform="rotate(305 100 100)">
      <line x1="100" y1="100" x2="100" y2="65" class="sweep" stroke-width="5" />
    </g>
  </g>
  <g class="hand minute">
    <g transform="rotate(60 100 100)">
      <line x1="100" y1="100" x2="100" y2="55" class="sweep" stroke-width="3" />
    </g>
  </g>
  <g class="hand second">
    <g transform="rotate(220 100 100)">
      <line x1="100" y1="110" x2="100" y2="50" class="sec-sweep" stroke-width="1.5" />
    </g>
  </g>
  
  <!-- Silver Pin -->
  <circle cx="100" cy="100" r="3" fill="#fff" />
</svg>
