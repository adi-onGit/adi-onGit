<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="100%" height="100%" shape-rendering="crispEdges">
  <style>
    @keyframes drift-fast {
      0% { transform: translateX(0); }
      100% { transform: translateX(-160px); }
    }
    @keyframes drift-slow {
      0% { transform: translateX(0); }
      100% { transform: translateX(-160px); }
    }
    .fog-layer-1 {
      animation: drift-fast 12s linear infinite;
    }
    .fog-layer-2 {
      animation: drift-slow 22s linear infinite;
    }
  </style>

  <!-- Background containment for preview -->
  <!-- Layer 2 (Slower, Back) -->
  <g class="fog-layer-2">
    <!-- Repeats every 160px for seamless looping -->
    <path d="
      M 0 10 h 20 v 4 h -20 z M 10 14 h 30 v 4 h -30 z M 25 18 h 40 v 6 h -40 z M 60 24 h 30 v 4 h -30 z M 85 20 h 25 v 4 h -25 z M 100 12 h 20 v 4 h -20 z M 115 16 h 30 v 4 h -30 z
      M 160 10 h 20 v 4 h -20 z M 170 14 h 30 v 4 h -30 z M 185 18 h 40 v 6 h -40 z M 220 24 h 30 v 4 h -30 z M 245 20 h 25 v 4 h -25 z M 260 12 h 20 v 4 h -20 z M 275 16 h 30 v 4 h -30 z
    " fill="#7C3AED" opacity="0.10" />
  </g>

  <!-- Layer 1 (Faster, Front) -->
  <g class="fog-layer-1">
    <!-- Repeats every 160px for seamless looping -->
    <path d="
      M 5 22 h 15 v 3 h -15 z M 15 25 h 35 v 4 h -35 z M 40 29 h 45 v 6 h -45 z M 80 35 h 25 v 3 h -25 z M 95 30 h 30 v 5 h -30 z M 120 25 h 25 v 4 h -25 z M 140 20 h 15 v 3 h -15 z
      M 165 22 h 15 v 3 h -15 z M 175 25 h 35 v 4 h -35 z M 200 29 h 45 v 6 h -45 z M 240 35 h 25 v 3 h -25 z M 255 30 h 30 v 5 h -30 z M 280 25 h 25 v 4 h -25 z M 300 20 h 15 v 3 h -15 z
    " fill="#E11D48" opacity="0.08" />
  </g>
</svg>
