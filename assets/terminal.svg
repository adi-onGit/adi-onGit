<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="crt-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <style>
    .panel-title {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #FF6B00;
      letter-spacing: 2px;
    }
    .term-prompt {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #22C55E;
      font-size: 11px;
    }
    .term-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #E5E7EB;
      font-size: 11px;
    }
    .term-highlight {
      fill: #A78BFA;
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes crt-flicker {
      0% { opacity: 0.95; }
      50% { opacity: 1; }
      100% { opacity: 0.98; }
    }
    .cursor {
      animation: blink 1s infinite;
      fill: #22C55E;
    }
    .crt-overlay {
      animation: crt-flicker 0.15s infinite;
    }
  </style>

  <!-- Panel Border/Frame -->
  <rect x="5" y="5" width="340" height="290" fill="#090715" stroke="#7C3AED" stroke-width="3" rx="8" filter="url(#neon-glow)" />
  <rect x="10" y="10" width="330" height="280" fill="#0C0A1F" rx="5" />
  
  <!-- Corner studs -->
  <rect x="8" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="8" y="288" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="288" width="4" height="4" fill="#E11D48" />

  <!-- Panel Title -->
  <text x="175" y="35" class="panel-title" font-size="16" text-anchor="middle" filter="url(#neon-glow)">SYSTEM STATUS</text>
  <line x1="25" y1="45" x2="325" y2="45" stroke="#7C3AED" stroke-width="2" />

  <!-- Terminal Window Inner Frame (X=25, Y=60, width=300, height=210) -->
  <rect x="25" y="60" width="300" height="210" fill="#05030A" rx="4" stroke="#1F1A3A" stroke-width="1.5" />
  
  <!-- Terminal Header Dots -->
  <circle cx="38" cy="70" r="3" fill="#E11D48" />
  <circle cx="48" cy="70" r="3" fill="#FBBF24" />
  <circle cx="58" cy="70" r="3" fill="#22C55E" />
  <line x1="25" y1="80" x2="325" y2="80" stroke="#1F1A3A" stroke-width="1" />

  <!-- Console Text Output (Y starts at 100) -->
  <g transform="translate(35, 100)">
    <!-- Command line 1 -->
    <text x="0" y="0" class="term-prompt">adi-onGit@github:~$ <tspan class="term-text">whoami</tspan></text>
    
    <!-- Output -->
    <text x="0" y="20" class="term-text term-highlight">Full Stack Developer</text>
    
    <text x="0" y="45" class="term-text">Passionate about building</text>
    <text x="0" y="65" class="term-text">cool stuff and helping</text>
    <text x="0" y="85" class="term-text">the developer community.</text>
    
    <!-- Command line 2 -->
    <text x="0" y="115" class="term-prompt">adi-onGit@github:~$ <rect x="135" y="106" width="7" height="11" class="cursor" /></text>
  </g>

  <!-- CRT Scanlines & Flicker Overlay -->
  <g class="crt-overlay" pointer-events="none">
    <!-- Horizontal scanlines pattern -->
    <rect x="25" y="60" width="300" height="210" fill="url(#crt-grad)" opacity="0.4" />
    <path d="
      M 25 90 h 300 M 25 100 h 300 M 25 110 h 300 M 25 120 h 300 M 25 130 h 300 M 25 140 h 300 M 25 150 h 300 M 25 160 h 300 M 25 170 h 300 M 25 180 h 300 M 25 190 h 300 M 25 200 h 300 M 25 210 h 300 M 25 220 h 300 M 25 230 h 300 M 25 240 h 300 M 25 250 h 300 M 25 260 h 300
    " stroke="#000000" stroke-width="1.5" opacity="0.15" />
  </g>
</svg>
