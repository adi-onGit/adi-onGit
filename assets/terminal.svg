<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .terminal-text {
        font-family: 'Share Tech Mono', monospace;
        font-size: 13px;
        fill: #F8FAFC;
      }
      
      .prompt {
        fill: #3B82F6;
        font-weight: bold;
      }
      
      .host {
        fill: #D946EF;
      }
      
      .cmd {
        fill: #F8FAFC;
      }
      
      .output {
        fill: #A1A1AA;
      }
      
      .accent {
        fill: #7C3AED;
        font-weight: bold;
      }
      
      .cyan-txt {
        fill: #06B6D4;
      }

      .pink-txt {
        fill: #D946EF;
      }
      
      .cursor {
        animation: blink 1s step-end infinite;
        fill: #D946EF;
      }
      
      .glow-border {
        filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.4));
      }
      
      /* Staggered loading of commands for cyber terminal vibe */
      .stagger-line {
        opacity: 0;
        animation: showLine 0.3s ease-out forwards;
      }
      .line-1  { animation-delay: 0.2s; }
      .line-2  { animation-delay: 0.4s; }
      .line-3  { animation-delay: 0.6s; }
      .line-4  { animation-delay: 0.8s; }
      .line-5  { animation-delay: 1.0s; }
      .line-6  { animation-delay: 1.2s; }
      .line-7  { animation-delay: 1.4s; }
      .line-8  { animation-delay: 1.6s; }
      .line-9  { animation-delay: 1.8s; }
      .line-10 { animation-delay: 2.0s; }
      .line-11 { animation-delay: 2.2s; }
      .line-12 { animation-delay: 2.4s; }
      .line-13 { animation-delay: 2.6s; }
      .line-14 { animation-delay: 2.8s; }
      .line-15 { animation-delay: 3.0s; }
      .line-16 { animation-delay: 3.2s; }
      .line-17 { animation-delay: 3.4s; }
      .line-18 { animation-delay: 3.6s; }
      .line-19 { animation-delay: 3.8s; }
      .line-20 { animation-delay: 4.0s; }

      @keyframes showLine {
        to { opacity: 1; }
      }
      
      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
    
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#180C28" />
      <stop offset="100%" stop-color="#0E061B" />
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>

  <!-- Terminal Window Shadow & Glow -->
  <rect x="15" y="15" width="770" height="490" rx="10" fill="none" stroke="url(#borderGrad)" stroke-width="2" class="glow-border" />
  
  <!-- Terminal Window Body (Glassmorphism backdrop-like dark purple fill) -->
  <rect x="16" y="16" width="768" height="488" rx="9" fill="#0D0714" />
  
  <!-- Window Header Bar -->
  <rect x="16" y="16" width="768" height="30" rx="9" fill="url(#headerGrad)" />
  <!-- Corner rounding fix (cover bottom corners of header) -->
  <rect x="16" y="36" width="768" height="10" fill="#0D0714" />
  
  <!-- Window Controls (Red, Yellow, Green Buttons) -->
  <circle cx="36" cy="31" r="5" fill="#FF5F56" />
  <circle cx="52" cy="31" r="5" fill="#FFBD2E" />
  <circle cx="68" cy="31" r="5" fill="#27C93F" />
  
  <!-- Terminal Title -->
  <text x="400" y="35" font-family="Share Tech Mono, monospace" font-size="12" fill="#A855F7" text-anchor="middle" letter-spacing="1">adi-onGit@cybercore: ~</text>
  
  <!-- Network Status Icon -->
  <circle cx="750" cy="31" r="3" fill="#10B981" />
  <text x="738" y="34" font-family="Share Tech Mono, monospace" font-size="9" fill="#10B981" text-anchor="end">SYS ACTIVE</text>

  <!-- Shell Output -->
  <g class="terminal-text" xml:space="preserve">
    <!-- whoami -->
    <g class="stagger-line line-1">
      <text x="35" y="75" class="prompt">adi-onGit<tspan class="host">@cybercore</tspan>:~$ <tspan class="cmd">whoami</tspan></text>
    </g>
    <g class="stagger-line line-2 output">
      <text x="35" y="95">Name:       <tspan fill="#F8FAFC">Aditya Mohanty</tspan></text>
      <text x="35" y="110">Role:       <tspan fill="#F8FAFC">Full Stack Developer &amp; Cloud Explorer</tspan></text>
      <text x="35" y="125">Location:   <tspan fill="#F8FAFC">Bhubaneswar, India</tspan></text>
      <text x="35" y="140">Motto:      <tspan fill="#06B6D4">"Designing elegant solutions for a distributed world."</tspan></text>
    </g>
    
    <!-- skills -->
    <g class="stagger-line line-3">
      <text x="35" y="170" class="prompt">adi-onGit<tspan class="host">@cybercore</tspan>:~$ <tspan class="cmd">skills</tspan></text>
    </g>
    <g class="stagger-line line-4 output">
      <text x="35" y="190">Languages:  <tspan class="pink-txt">Java</tspan>, <tspan class="pink-txt">Python</tspan>, <tspan class="pink-txt">JavaScript (ES6)</tspan>, <tspan class="pink-txt">SQL</tspan></text>
      <text x="35" y="205">Frontend:   <tspan class="pink-txt">React.js</tspan>, <tspan class="pink-txt">HTML5</tspan>, <tspan class="pink-txt">CSS3</tspan>, <tspan class="pink-txt">Tailwind CSS</tspan></text>
      <text x="35" y="220">Backend:    <tspan class="pink-txt">Node.js</tspan>, <tspan class="pink-txt">Express.js</tspan></text>
      <text x="35" y="235">Database:   <tspan class="pink-txt">MongoDB</tspan>, <tspan class="pink-txt">MySQL</tspan></text>
      <text x="35" y="250">Cloud/Dev:  <tspan class="pink-txt">Google Cloud Platform (GCP)</tspan>, <tspan class="pink-txt">Git</tspan>, <tspan class="pink-txt">GitHub</tspan>, <tspan class="pink-txt">Postman</tspan></text>
    </g>

    <!-- projects -->
    <g class="stagger-line line-5">
      <text x="35" y="280" class="prompt">adi-onGit<tspan class="host">@cybercore</tspan>:~$ <tspan class="cmd">projects</tspan></text>
    </g>
    <g class="stagger-line line-6 output">
      <text x="35" y="300">- <tspan fill="#F8FAFC">Expense Tracker:</tspan>             Smart personal finance tracker with visualization dashboard</text>
      <text x="35" y="315">- <tspan fill="#F8FAFC">Portfolio Website:</tspan>           3D/Neon Cyberpunk resume with animated modules</text>
      <text x="35" y="330">- <tspan fill="#F8FAFC">Placement Management System:</tspan> Secure, role-based campus recruitment portal</text>
      <text x="35" y="345">- <tspan fill="#F8FAFC">AI Assistant:</tspan>                 LLM agent integrating tools, search &amp; code gen</text>
    </g>

    <!-- status -->
    <g class="stagger-line line-7">
      <text x="35" y="375" class="prompt">adi-onGit<tspan class="host">@cybercore</tspan>:~$ <tspan class="cmd">status</tspan></text>
    </g>
    <g class="stagger-line line-8 output">
      <text x="35" y="395">System Load:  <tspan fill="#10B981">STABLE (0.12)</tspan></text>
      <text x="35" y="410">Current Goal: <tspan fill="#3B82F6">Expanding expertise in Cloud Native Architectures &amp; GenAI Agents</tspan></text>
    </g>

    <!-- exit -->
    <g class="stagger-line line-9">
      <text x="35" y="440" class="prompt">adi-onGit<tspan class="host">@cybercore</tspan>:~$ <tspan class="cmd">exit</tspan></text>
    </g>
    <g class="stagger-line line-10">
      <text x="35" y="460" class="pink-txt">Logging out of CyberCore terminal session...</text>
      <text x="35" y="475" class="cyan-txt">Goodbye. System ready for next connection.</text>
      <!-- Blinking block cursor -->
      <rect x="35" y="485" width="8" height="13" class="cursor" />
    </g>
  </g>
</svg>
