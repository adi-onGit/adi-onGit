<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .panel-title {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #FF6B00;
      letter-spacing: 2px;
    }
    .arena-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #E5E7EB;
      font-size: 11px;
    }
    .kombo-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #E5E7EB;
      font-size: 12px;
      letter-spacing: 1px;
    }
    @keyframes grid-pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .grid-node {
      animation: grid-pulse 2s infinite alternate;
    }
    @keyframes fighter-sway {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .mini-fighter {
      animation: fighter-sway 2.5s ease-in-out infinite;
    }
  </style>

  <!-- Panel Border/Frame -->
  <rect x="5" y="5" width="340" height="290" fill="#090715" stroke="#7C3AED" stroke-width="3" rx="8" filter="url(#neon-glow)" />
  <rect x="10" y="10" width="330" height="280" fill="#0C0A1F" rx="5" />
  
  <!-- Corner studs -->
  <rect x="8" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="8" y="288" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="288" width="4" height="4" fill="#E11D48" />

  <!-- Panel Title -->
  <text x="175" y="35" class="panel-title" font-size="16" text-anchor="middle" filter="url(#neon-glow)">GITHUB ARENA</text>
  <line x1="25" y1="45" x2="325" y2="45" stroke="#7C3AED" stroke-width="2" />

  <!-- Legend at the top (X=170, Y=60) -->
  <g transform="translate(170, 56)">
    <text x="0" y="10" class="arena-text" font-size="9" fill="#94A3B8">Less</text>
    <rect x="30" y="2" width="8" height="8" fill="#110E26" />
    <rect x="42" y="2" width="8" height="8" fill="#4C1D95" />
    <rect x="54" y="2" width="8" height="8" fill="#7C3AED" />
    <rect x="66" y="2" width="8" height="8" fill="#A78BFA" />
    <rect x="78" y="2" width="8" height="8" fill="#C084FC" />
    <text x="94" y="10" class="arena-text" font-size="9" fill="#94A3B8">More</text>
  </g>

  <!-- Mini Character on Left (X=25, Y=80) -->
  <g class="mini-fighter" transform="translate(25, 80) scale(0.7)">
    <!-- Base shadow -->
    <ellipse cx="25" cy="58" rx="10" ry="2.5" fill="#020205" opacity="0.6" />
    <!-- Ninja legs -->
    <path d="M 18 48 h 4 v 4 h -4 z M 30 48 h 4 v 4 h -4 z" fill="#1F1A3A" />
    <!-- Torso -->
    <rect x="16" y="28" width="18" height="20" fill="#1F1A3A" />
    <rect x="18" y="30" width="14" height="14" fill="#7C3AED" />
    <!-- Head -->
    <rect x="17" y="12" width="16" height="16" fill="#1F1A3A" />
    <rect x="19" y="14" width="12" height="12" fill="#7C3AED" />
    <rect x="18" y="18" width="14" height="4" fill="#110E26" />
    <!-- Glowing orange eyes -->
    <rect x="21" y="19" width="2" height="1.5" fill="#FF6B00" />
    <rect x="27" y="19" width="2" height="1.5" fill="#FF6B00" />
    <!-- Arm -->
    <path d="M 33 28 h 4 v 10 h -4 z" fill="#1F1A3A" />
    <rect x="34" y="36" width="3" height="3" fill="#E11D48" />
  </g>

