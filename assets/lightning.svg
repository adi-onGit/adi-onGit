<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 128" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes lightning-strike {
      0%, 94%, 100% { opacity: 0; transform: scaleY(0); }
      95% { opacity: 1; transform: scaleY(1); }
      96% { opacity: 0.3; transform: scaleY(1); }
      97% { opacity: 0.9; transform: scaleY(1); }
      98% { opacity: 0.1; transform: scaleY(0.8); }
      99% { opacity: 1; transform: scaleY(1); }
    }
    .anim-lightning {
      transform-origin: top center;
      animation: lightning-strike 7s infinite;
    }
  </style>

  <!-- Glowing Lightning Bolt -->
  <g class="anim-lightning" filter="url(#bolt-glow)">
    <!-- Primary Bolt (Core White, Edges Cyan/Blue) -->
    <!-- Border/Outer Glow in Cyan/Blue -->
    <path d="
      M 30 0 h 6 v 10 h -4 v 12 h 8 v -4 h 4 v 14 h -8 v 12 h 12 v -4 h 4 v 20 h -12 v 16 h 8 v 20 h -8 v 20 h -4 v -24 h 6 v -16 h -10 v -18 h 12 v -12 h -8 v -14 h 6 v -10 h -8 z
    " fill="#00D2FF" />

    <!-- Inner Core (White) -->
    <path d="
      M 32 0 h 2 v 12 h -2 v 10 h 4 v 10 h -4 v 12 h 6 v 16 h -8 v 18 h 4 v 22 h -2 v -24 h 4 v -14 h -6 v -18 h 4 v -10 h -4 v -12 h 2 z
    " fill="#FFFFFF" />
  </g>
</svg>
