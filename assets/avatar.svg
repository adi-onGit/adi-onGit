<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Glowing Neon Filters -->
    <filter id="neonPink" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.2" flood-color="#D946EF" flood-opacity="0.95" />
    </filter>
    <filter id="neonBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#3B82F6" flood-opacity="0.9" />
    </filter>
    <filter id="neonPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#7C3AED" flood-opacity="0.9" />
    </filter>
    
    <linearGradient id="avatarBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <radialGradient id="avatarBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#120822" />
      <stop offset="100%" stop-color="#09090B" />
    </radialGradient>
    
    <style>
      .bg-hex {
        fill: url(#avatarBg);
        stroke: url(#avatarBorder);
        stroke-width: 2;
        filter: drop-shadow(0 0 5px rgba(124, 58, 237, 0.4));
      }
      .hud-ring {
        fill: none;
        stroke: #3B82F6;
        stroke-width: 0.8;
        stroke-dasharray: 4, 4;
        transform-origin: 50px 50px;
        animation: rotateRing 15s infinite linear;
        opacity: 0.4;
      }
      .hood {
        fill: #120822;
        stroke: #7C3AED;
        stroke-width: 1.5;
        filter: url(#neonPurple);
      }
      .hood-shadow {
        fill: #090514;
      }
      .visor {
        fill: #0D0714;
        stroke: #D946EF;
        stroke-width: 1.5;
        filter: url(#neonPink);
      }
      .visor-glow {
        fill: none;
        stroke: #3B82F6;
        stroke-width: 1.5;
        filter: url(#neonBlue);
      }
      .collar {
        fill: #1A0F30;
        stroke: #3B82F6;
        stroke-width: 1.2;
        filter: url(#neonBlue);
      }
      .decals {
        fill: #D946EF;
        opacity: 0.7;
      }
      @keyframes rotateRing {
        100% { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <!-- Cybernetic Hexagonal Base -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" class="bg-hex" />
  
  <!-- Rotating Targeting HUD Ring -->
  <circle cx="50" cy="50" r="38" class="hud-ring" />

  <!-- Character Layer: Techwear Hacker -->
  <!-- Shoulders / Coat Collar -->
  <path d="M 24,85 C 24,75 32,70 50,70 C 68,70 76,75 76,85 L 72,92 H 28 Z" class="collar" />
  <path d="M 38,70 L 50,82 L 62,70" fill="#0D0714" stroke="#7C3AED" stroke-width="1" />
  <line x1="50" y1="82" x2="50" y2="92" stroke="#D946EF" stroke-width="1.5" filter="url(#neonPink)" />

  <!-- Dark Hood Silhouette -->
  <!-- Outer Hood -->
  <path d="M 28,55 C 28,30 35,20 50,20 C 65,20 72,30 72,55 C 72,66 68,72 65,74 C 58,78 42,78 35,74 C 32,72 28,66 28,55 Z" class="hood" />
  <!-- Inner Hood Shadow (Face Cavity) -->
  <path d="M 33,55 C 33,35 38,26 50,26 C 62,26 67,35 67,55 C 67,65 62,70 50,70 C 38,70 33,65 33,55 Z" class="hood-shadow" />

  <!-- Cyber Visor Mask (inside hood) -->
  <!-- Visor Base -->
  <path d="M 36,44 C 36,38 40,36 50,36 C 60,36 64,38 64,44 C 64,52 60,56 50,56 C 40,56 36,52 36,44 Z" class="visor" />
  
  <!-- Visor Cyber HUD lines (Neon Blue data crosshair) -->
  <path d="M 39,44 H 61" class="visor-glow" />
  <path d="M 50,40 V 50" class="visor-glow" />
  <circle cx="50" cy="44" r="2.5" fill="none" stroke="#3B82F6" stroke-width="1" filter="url(#neonBlue)" />

  <!-- Digital Glitch Dots / Decals on Visor -->
  <rect x="41" y="47" width="2" height="1" class="decals" />
  <rect x="57" y="40" width="1.5" height="1.5" class="decals" />
  <rect x="55" y="48" width="2" height="1" class="decals" />
  
  <!-- Subtle Hood folds highlight -->
  <path d="M 50,20 Q 52,28 50,30" fill="none" stroke="#D946EF" stroke-width="1" filter="url(#neonPink)" opacity="0.6" />
</svg>
