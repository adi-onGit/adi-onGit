<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <defs>
    <!-- Native SVG Glowing Filters (Universal Compatibility) -->
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#7C3AED" flood-opacity="0.85" />
    </filter>
    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#D946EF" flood-opacity="0.95" />
    </filter>
    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="0.8" flood-color="#3B82F6" flood-opacity="0.8" />
    </filter>
    <filter id="glowWhite" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#FFFFFF" flood-opacity="0.9" />
    </filter>
  </defs>

  <style>
    /* Default / Light Mode (CyberCore Purple and Blue Eyes) */
    .bat-shape { 
      fill: #7C3AED; 
      filter: url(#glowPurple);
    }
    .bat-eye { 
      fill: #3B82F6; 
      filter: url(#glowBlue);
    }
    
    /* Dark Mode Theme (Glowing Neon Pink and White Eyes) */
    @media (prefers-color-scheme: dark) {
      .bat-shape { 
        fill: #D946EF; 
        filter: url(#glowPink);
      }
      .bat-eye { 
        fill: #F8FAFC; 
        filter: url(#glowWhite);
      }
    }
    
    .frame-1 { animation: flap1 0.4s steps(1) infinite; }
    .frame-2 { animation: flap2 0.4s steps(1) infinite; opacity: 0; }
    
    @keyframes flap1 { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes flap2 { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  </style>

  <!-- Frame 1: Wings arched UP -->
  <g class="frame-1">
    <path class="bat-shape" d="M11 7h2v2h-2z M19 7h2v2h-2z M12 9h8v1h-8z M11 10h10v5h-10z M12 15h8v2h-8z M14 17h4v1h-4z M9 9h2v5h-2z M7 7h2v4h-2z M5 6h2v3h-2z M3 6h2v2h-2z M2 8h2v4h-2z M3 12h3v2h-3z M5 14h2v2h-2z M6 16h3v1h-3z M8 15h3v2h-3z M21 9h2v5h-2z M23 7h2v4h-2z M25 6h2v3h-2z M27 6h2v2h-2z M28 8h2v4h-2z M26 12h3v2h-3z M25 14h2v2h-2z M23 16h3v1h-3z M21 15h3v2h-3z M1 10h1v1h-1z M4 4h1v1h-1z M30 10h1v1h-1z M27 4h1v1h-1z"/>
    <path class="bat-eye" d="M13 11h2v2h-2z M17 11h2v2h-2z"/>
  </g>

  <!-- Frame 2: Wings swept DOWN -->
  <g class="frame-2">
    <path class="bat-shape" d="M11 7h2v2h-2z M19 7h2v2h-2z M12 9h8v1h-8z M11 10h10v5h-10z M12 15h8v2h-8z M14 17h4v1h-4z M8 12h3v5h-3z M5 14h3v5h-3z M2 17h3v4h-3z M4 21h2v2h-2z M7 19h2v2h-2z M21 12h3v5h-3z M24 14h3v5h-3z M27 17h3v4h-3z M26 21h2v2h-2z M23 19h2v2h-2z M1 16h1v1h-1z M6 22h1v1h-1z M30 16h1v1h-1z M25 22h1v1h-1z"/>
    <path class="bat-eye" d="M13 11h2v2h-2z M17 11h2v2h-2z"/>
  </g>
</svg>
