<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">

  <defs>

    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140A26"/>
      <stop offset="100%" stop-color="#09090B"/>
    </radialGradient>

    <radialGradient id="nebula1">
      <stop offset="0%" stop-color="#A855F7" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="nebula2">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="shoot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D946EF"/>
      <stop offset="40%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)"/>

  <!-- Nebula -->
  <ellipse cx="180" cy="80" rx="160" ry="70" fill="url(#nebula1)">
    <animate attributeName="opacity"
             values=".15;.3;.15"
             dur="12s"
             repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="620" cy="120" rx="180" ry="80" fill="url(#nebula2)">
    <animate attributeName="opacity"
             values=".1;.22;.1"
             dur="15s"
             repeatCount="indefinite"/>
  </ellipse>

  <!-- Animated Stars -->

  <g fill="#ffffff">

    <circle cx="40" cy="30" r="1.2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="90" cy="80" r="1.5">
      <animate attributeName="opacity" values=".1;1;.1" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <circle cx="150" cy="40" r="1">
      <animate attributeName="opacity" values=".2;1;.2" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="220" cy="150" r="1.7">
      <animate attributeName="opacity" values=".1;1;.1" dur="2.7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="310" cy="55" r="1.4">
      <animate attributeName="opacity" values=".2;1;.2" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="420" cy="130" r="1.8">
      <animate attributeName="opacity" values=".1;1;.1" dur="2.3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="520" cy="70" r="1.3">
      <animate attributeName="opacity" values=".2;1;.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="610" cy="35" r="1.5">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="690" cy="110" r="1.8">
      <animate attributeName="opacity" values=".1;1;.1" dur="3.8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="760" cy="45" r="1.2">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>

  </g>

  <!-- Colored Stars -->

  <circle cx="130" cy="150" r="2" fill="#D946EF" filter="url(#glow)">
    <animate attributeName="opacity" values=".2;1;.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <circle cx="520" cy="30" r="2" fill="#3B82F6" filter="url(#glow)">
    <animate attributeName="opacity" values=".2;1;.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <circle cx="700" cy="160" r="2.2" fill="#A855F7" filter="url(#glow)">
    <animate attributeName="opacity" values=".2;1;.2" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Shooting Star -->

  <path d="M-40 0 L40 40"
        stroke="url(#shoot)"
        stroke-width="2"
        stroke-linecap="round">

    <animateTransform
      attributeName="transform"
      type="translate"
      from="-100 -20"
      to="900 260"
      dur="8s"
      repeatCount="indefinite"/>

  </path>

  <!-- Second Shooting Star -->

  <path d="M-20 0 L25 25"
        stroke="url(#shoot)"
        stroke-width="1.5"
        stroke-linecap="round">

    <animateTransform
      attributeName="transform"
      type="translate"
      from="250 -60"
      to="850 200"
      dur="12s"
      begin="4s"
      repeatCount="indefinite"/>

  </path>

</svg>
