<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <style>
      .star-white { fill: #F8FAFC; }
      .star-pink { fill: #D946EF; filter: drop-shadow(0 0 4px #D946EF); }
      .star-blue { fill: #3B82F6; filter: drop-shadow(0 0 4px #3B82F6); }
      .star-purple { fill: #A855F7; filter: drop-shadow(0 0 4px #A855F7); }
      
      .pulse-1 { animation: blink 2s infinite alternate ease-in-out; }
      .pulse-2 { animation: blink 3s infinite alternate ease-in-out; }
      .pulse-3 { animation: blink 4s infinite alternate ease-in-out; }
      .pulse-4 { animation: blink 1.5s infinite alternate ease-in-out; }
      
      @keyframes blink {
        0% { opacity: 0.15; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0.15; transform: scale(0.8); }
      }
    </style>
    
    <radialGradient id="spaceBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140A26" />
      <stop offset="100%" stop-color="#09090B" />
    </radialGradient>

    <linearGradient id="shootGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D946EF" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#spaceBg)" />
  
  <!-- Sparkling Stars Grid (Static coordinates, animated scale/opacity) -->
  <!-- Row 1 -->
  <circle cx="45" cy="30" r="1.5" class="star-white pulse-1" />
  <circle cx="120" cy="70" r="2" class="star-pink pulse-2" />
  <circle cx="210" cy="40" r="1" class="star-white pulse-3" />
  <circle cx="340" cy="80" r="2.5" class="star-blue pulse-4" />
  <circle cx="430" cy="25" r="1.5" class="star-purple pulse-2" />
  <circle cx="510" cy="65" r="1" class="star-white pulse-1" />
  <circle cx="620" cy="35" r="2" class="star-pink pulse-3" />
  <circle cx="730" cy="75" r="1.5" class="star-white pulse-4" />

  <!-- Row 2 -->
  <circle cx="80" cy="130" r="1" class="star-white pulse-3" />
  <circle cx="160" cy="160" r="2.5" class="star-blue pulse-1" />
  <circle cx="270" cy="120" r="1.5" class="star-purple pulse-4" />
  <circle cx="390" cy="150" r="2" class="star-pink pulse-2" />
  <circle cx="480" cy="115" r="1" class="star-white pulse-3" />
  <circle cx="570" cy="165" r="2.5" class="star-blue pulse-1" />
  <circle cx="680" cy="130" r="1.5" class="star-white pulse-4" />
  <circle cx="760" cy="155" r="2" class="star-pink pulse-2" />
  
  <!-- Stardust clusters (small static faint stars) -->
  <g opacity="0.3" fill="#F8FAFC">
    <circle cx="150" cy="50" r="0.8" />
    <circle cx="155" cy="48" r="0.6" />
    <circle cx="162" cy="55" r="0.8" />
    <circle cx="300" cy="140" r="0.7" />
    <circle cx="308" cy="138" r="0.5" />
    <circle cx="530" cy="45" r="0.8" />
    <circle cx="538" cy="48" r="0.6" />
    <circle cx="700" cy="85" r="0.7" />
    <circle cx="706" cy="80" r="0.5" />
  </g>

  <!-- Shooting Star 1 -->
  <path d="M -40,10 L 40,50" stroke="url(#shootGrad)" stroke-width="2" stroke-linecap="round">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,0" 
      to="850,425" 
      dur="7s" 
      repeatCount="indefinite" />
  </path>

  <!-- Shooting Star 2 -->
  <path d="M 250,-30 L 320,10" stroke="url(#shootGrad)" stroke-width="1.5" stroke-linecap="round">
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      from="0,0" 
      to="600,340" 
      dur="10s" 
      begin="3.5s" 
      repeatCount="indefinite" />
  </path>
</svg>
