<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 400" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .panel-title {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #FF6B00;
      letter-spacing: 2px;
    }
    .stat-label {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #E5E7EB;
      font-size: 11px;
    }
    .stat-val {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #FF6B00;
      font-size: 11px;
    }
    .special-move {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #E11D48;
      font-size: 12px;
      letter-spacing: 1.5px;
    }
    @keyframes bar-flicker {
      0%, 100% { opacity: 0.95; }
      50% { opacity: 1; }
    }
    .fill-block {
      animation: bar-flicker 1.5s infinite alternate;
    }
  </style>

  <!-- Panel Border/Frame -->
  <rect x="5" y="5" width="340" height="390" fill="#090715" stroke="#7C3AED" stroke-width="3" rx="8" filter="url(#neon-glow)" />
  <rect x="10" y="10" width="330" height="380" fill="#0C0A1F" rx="5" />
  
  <!-- Corner studs -->
  <rect x="8" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="8" y="388" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="388" width="4" height="4" fill="#E11D48" />

  <!-- Panel Title -->
  <text x="175" y="35" class="panel-title" font-size="16" text-anchor="middle" filter="url(#neon-glow)">FIGHTER STATS</text>
  <line x1="25" y1="45" x2="325" y2="45" stroke="#7C3AED" stroke-width="2" />

  <!-- STATS ROWS -->
  <!-- 1. STRENGTH (85%) -->
  <g transform="translate(25, 60)">
    <!-- Sword Icon -->
    <path d="M 5 0 h 2 v 10 h -2 z M 3 8 h 6 v 2 h -6 z M 5 10 h 2 v 4 h -2 z" fill="#E11D48" />
    <text x="25" y="11" class="stat-label">STRENGTH</text>
    <!-- Progress Bar (85% = 8 filled, 1 half, 1 empty) -->
    <g class="fill-block" transform="translate(130, 2)">
      <rect x="0" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="13" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="26" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="39" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="52" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="65" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="78" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="91" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="104" y="0" width="5" height="10" fill="#FBBF24" /> <!-- half -->
      <rect x="109" y="0" width="5" height="10" fill="#1A153B" />
      <rect x="117" y="0" width="10" height="10" fill="#1A153B" />
    </g>
    <text x="295" y="11" class="stat-val">85%</text>
  </g>

  <!-- 2. CODING (95%) -->
  <g transform="translate(25, 110)">
    <!-- Code Bracket Icon -->
    <path d="M 4 2 L 1 5 L 4 8 M 8 2 L 11 5 L 8 8 M 7 1 L 5 9" stroke="#E11D48" stroke-width="1.5" fill="none" />
    <text x="25" y="11" class="stat-label">CODING</text>
    <!-- Progress Bar (95% = 9 filled, 1 half) -->
    <g class="fill-block" transform="translate(130, 2)" style="animation-delay: 0.15s;">
      <rect x="0" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="13" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="26" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="39" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="52" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="65" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="78" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="91" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="104" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="117" y="0" width="5" height="10" fill="#FBBF24" />
      <rect x="122" y="0" width="5" height="10" fill="#1A153B" />
    </g>
    <text x="295" y="11" class="stat-val">95%</text>
  </g>

  <!-- 3. CREATIVITY (80%) -->
  <g transform="translate(25, 160)">
    <!-- Lightbulb/Spark Icon -->
    <path d="M 5 0 h 2 v 2 h -2 z M 2 3 h 8 v 6 h -8 z M 4 9 h 4 v 3 h -4 z" fill="#E11D48" />
    <text x="25" y="11" class="stat-label">CREATIVITY</text>
    <!-- Progress Bar (80% = 8 filled) -->
    <g class="fill-block" transform="translate(130, 2)" style="animation-delay: 0.3s;">
      <rect x="0" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="13" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="26" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="39" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="52" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="65" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="78" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="91" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="104" y="0" width="10" height="10" fill="#1A153B" />
      <rect x="117" y="0" width="10" height="10" fill="#1A153B" />
    </g>
    <text x="295" y="11" class="stat-val">80%</text>
  </g>

  <!-- 4. DEBUGGING (95%) -->
  <g transform="translate(25, 210)">
    <!-- Beetle/Bug Icon -->
    <path d="M 5 2 h 2 v 8 h -2 z M 3 4 h 6 v 2 h -6 z M 3 7 h 6 v 2 h -6 z M 1 2 L 3 4 M 11 2 L 9 4" stroke="#E11D48" stroke-width="1.25" fill="none" />
    <text x="25" y="11" class="stat-label">DEBUGGING</text>
    <!-- Progress Bar (95%) -->
    <g class="fill-block" transform="translate(130, 2)" style="animation-delay: 0.45s;">
      <rect x="0" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="13" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="26" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="39" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="52" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="65" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="78" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="91" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="104" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="117" y="0" width="5" height="10" fill="#FBBF24" />
      <rect x="122" y="0" width="5" height="10" fill="#1A153B" />
    </g>
    <text x="295" y="11" class="stat-val">95%</text>
  </g>

  <!-- 5. FOCUS (90%) -->
  <g transform="translate(25, 260)">
    <!-- Target Crosshair Icon -->
    <circle cx="6" cy="6" r="5" stroke="#E11D48" stroke-width="1.5" fill="none" />
    <rect x="5" y="5" width="2" height="2" fill="#E11D48" />
    <text x="25" y="11" class="stat-label">FOCUS</text>
    <!-- Progress Bar (90%) -->
    <g class="fill-block" transform="translate(130, 2)" style="animation-delay: 0.6s;">
      <rect x="0" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="13" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="26" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="39" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="52" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="65" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="78" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="91" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="104" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="117" y="0" width="10" height="10" fill="#1A153B" />
    </g>
    <text x="295" y="11" class="stat-val">90%</text>
  </g>

  <!-- 6. COFFEE (85%) -->
  <g transform="translate(25, 310)">
    <!-- Coffee Cup Icon -->
    <path d="M 1 2 h 8 v 6 h -8 z M 9 3 h 2 v 3 h -2 z M 3 0 v 1 M 6 0 v 1" stroke="#E11D48" stroke-width="1.25" fill="none" />
    <text x="25" y="11" class="stat-label">COFFEE</text>
    <!-- Progress Bar (85%) -->
    <g class="fill-block" transform="translate(130, 2)" style="animation-delay: 0.75s;">
      <rect x="0" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="13" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="26" y="0" width="10" height="10" fill="#E11D48" />
      <rect x="39" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="52" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="65" y="0" width="10" height="10" fill="#FF6B00" />
      <rect x="78" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="91" y="0" width="10" height="10" fill="#FBBF24" />
      <rect x="104" y="0" width="5" height="10" fill="#FBBF24" />
      <rect x="109" y="0" width="5" height="10" fill="#1A153B" />
      <rect x="117" y="0" width="10" height="10" fill="#1A153B" />
    </g>
    <text x="295" y="11" class="stat-val">85%</text>
  </g>

  <!-- Special Move Divider -->
  <line x1="25" y1="345" x2="325" y2="345" stroke="#7C3AED" stroke-dasharray="4 4" stroke-width="1.5" />

  <!-- Special Move Text -->
  <text x="175" y="370" class="special-move" text-anchor="middle" filter="url(#neon-glow)">SPECIAL MOVE: CLEAN CODE</text>
</svg>
