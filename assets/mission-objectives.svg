<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 400" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .panel-title {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #FF6B00;
      letter-spacing: 2px;
    }
    .objective-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #E5E7EB;
      font-size: 11px;
    }
    .objective-completed {
      fill: #22C55E;
    }
    .objective-active {
      fill: #A78BFA;
    }
    .objective-locked {
      fill: #94A3B8;
      opacity: 0.5;
    }
    @keyframes blink-arrow {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(3px); }
    }
    .active-arrow {
      animation: blink-arrow 1s infinite;
    }
  </style>

  <!-- Panel Border/Frame -->
  <rect x="5" y="5" width="340" height="390" fill="#090715" stroke="#7C3AED" stroke-width="3" rx="8" filter="url(#neon-glow)" />
  <rect x="10" y="10" width="330" height="380" fill="#0C0A1F" rx="5" />
  
  <!-- Corner studs -->
  <rect x="8" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="8" y="388" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="388" width="4" height="4" fill="#E11D48" />

  <!-- Panel Title -->
  <text x="175" y="35" class="panel-title" font-size="16" text-anchor="middle" filter="url(#neon-glow)">MISSION OBJECTIVES</text>
  <line x1="25" y1="45" x2="325" y2="45" stroke="#7C3AED" stroke-width="2" />

  <!-- 1. Learn. Build. Repeat. (Completed) -->
  <g transform="translate(25, 65)">
    <!-- Green Checkmark -->
    <path d="M 2 5 L 5 8 L 10 2" stroke="#22C55E" stroke-width="2.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-completed">Learn. Build. Repeat.</text>
  </g>

  <!-- 2. Master Full Stack (Completed) -->
  <g transform="translate(25, 105)">
    <!-- Green Checkmark -->
    <path d="M 2 5 L 5 8 L 10 2" stroke="#22C55E" stroke-width="2.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-completed">Master Full Stack</text>
  </g>

  <!-- 3. Google Cloud Certified (Completed) -->
  <g transform="translate(25, 145)">
    <!-- Green Checkmark -->
    <path d="M 2 5 L 5 8 L 10 2" stroke="#22C55E" stroke-width="2.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-completed">Google Cloud Certified</text>
  </g>

  <!-- 4. Build Epic Projects (Completed) -->
  <g transform="translate(25, 185)">
    <!-- Green Checkmark -->
    <path d="M 2 5 L 5 8 L 10 2" stroke="#22C55E" stroke-width="2.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-completed">Build Epic Projects</text>
  </g>

  <!-- 5. Contribute to Open Source (Active) -->
  <g transform="translate(25, 225)">
    <!-- Purple Glowing Arrow -->
    <g class="active-arrow" filter="url(#neon-glow)">
      <path d="M 1 5 h 8 M 6 2 L 9 5 L 6 8" stroke="#7C3AED" stroke-width="2" fill="none" />
    </g>
    <text x="25" y="10" class="objective-text objective-active">Contribute to Open Source</text>
  </g>

  <!-- 6. AI & ML Ninja (Locked) -->
  <g transform="translate(25, 265)">
    <!-- Lock Icon -->
    <rect x="2" y="6" width="8" height="6" fill="#4B5563" />
    <path d="M 3 6 v -3 a 2 2 0 0 1 4 0 v 3" stroke="#4B5563" stroke-width="1.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-locked">AI &amp; ML Ninja</text>
  </g>

  <!-- 7. 1000+ GitHub Contributions (Locked) -->
  <g transform="translate(25, 305)">
    <!-- Lock Icon -->
    <rect x="2" y="6" width="8" height="6" fill="#4B5563" />
    <path d="M 3 6 v -3 a 2 2 0 0 1 4 0 v 3" stroke="#4B5563" stroke-width="1.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-locked">1000+ Contributions</text>
  </g>

  <!-- 8. Build My Own Startup (Locked) -->
  <g transform="translate(25, 345)">
    <!-- Lock Icon -->
    <rect x="2" y="6" width="8" height="6" fill="#4B5563" />
    <path d="M 3 6 v -3 a 2 2 0 0 1 4 0 v 3" stroke="#4B5563" stroke-width="1.5" fill="none" />
    <text x="25" y="10" class="objective-text objective-locked">Build My Own Startup</text>
  </g>
</svg>
