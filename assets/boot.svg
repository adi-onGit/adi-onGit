<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .text-mono {
        font-family: 'Share Tech Mono', monospace;
        fill: #F8FAFC;
      }
      
      .neon-glow {
        filter: drop-shadow(0 0 8px #7C3AED) drop-shadow(0 0 15px #A855F7);
      }
      
      .neon-glow-pink {
        filter: drop-shadow(0 0 8px #D946EF) drop-shadow(0 0 15px #D946EF);
      }
      
      .circuit-line {
        stroke: #7C3AED;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: drawCircuit 4s ease-out forwards;
      }

      .pulse-glow {
        animation: pulse 2s infinite ease-in-out;
      }
      
      .fade-line {
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      
      .line-1 { animation-delay: 0.5s; }
      .line-2 { animation-delay: 1.2s; }
      .line-3 { animation-delay: 1.8s; }
      .line-4 { animation-delay: 2.5s; }
      .line-5 { animation-delay: 3.2s; }
      .line-6 { animation-delay: 3.8s; }
      
      .progress-fill {
        width: 0%;
        animation: fillProgress 2.2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        animation-delay: 1.8s;
      }
      
      .cursor {
        animation: blink 1s step-end infinite;
      }
      
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      
      @keyframes fillProgress {
        to { width: 344px; }
      }
      
      @keyframes blink {
        50% { opacity: 0; }
      }
      
      @keyframes drawCircuit {
        to { stroke-dashoffset: 0; }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 6px #D946EF); }
        50% { opacity: 1; filter: drop-shadow(0 0 15px #D946EF) drop-shadow(0 0 25px #7C3AED); }
      }
    </style>
    
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#150B24" />
      <stop offset="100%" stop-color="#09090B" />
    </radialGradient>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000" stroke-width="1.5" opacity="0.35" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />
  <rect width="800" height="450" fill="url(#scanlines)" />

  <!-- Outer Glass Frame -->
  <rect x="20" y="20" width="760" height="410" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.75" />

  <!-- Corner Circuit Accents -->
  <path d="M 15 40 L 40 40 L 50 50 L 120 50" class="circuit-line" />
  <circle cx="120" cy="50" r="3" fill="#7C3AED" class="neon-glow" />
  <circle cx="15" cy="40" r="3" fill="#7C3AED" class="neon-glow" />
  
  <path d="M 785 410 L 760 410 L 750 400 L 680 400" class="circuit-line" />
  <circle cx="680" cy="400" r="3" fill="#D946EF" class="neon-glow-pink" />
  <circle cx="785" cy="410" r="3" fill="#D946EF" class="neon-glow-pink" />

  <!-- Boot Text Logs -->
  <g class="text-mono" font-size="14">
    <!-- Header -->
    <text x="50" y="70" fill="#A855F7" font-weight="bold" letter-spacing="1.5">CYBERCORE BIOS v1.0.8</text>
    <text x="50" y="92" fill="#A1A1AA">CPU: NEURAL CORE PRO @ 4.80GHz</text>
    <text x="50" y="112" fill="#A1A1AA">SYSTEM RAM: 64GB NEURAL-LINK MEMORY</text>
    
    <!-- Logs -->
    <text x="50" y="150" class="fade-line line-1">&gt; Initializing security protocols... <tspan fill="#3B82F6">SUCCESS</tspan></text>
    <text x="50" y="175" class="fade-line line-2">&gt; Syncing developer workspace: Aditya Mohanty... <tspan fill="#3B82F6">DONE</tspan></text>
    
    <!-- Progress Section -->
    <text x="50" y="210" class="fade-line line-3" fill="#A1A1AA">&gt; Loading system repositories and assets...</text>
    
    <!-- Progress Bar -->
    <g class="fade-line line-3">
      <rect x="50" y="225" width="350" height="15" rx="3" fill="none" stroke="#7C3AED" stroke-width="1" />
      <rect x="53" y="228" width="0" height="9" rx="1.5" fill="url(#borderGrad)" class="progress-fill" />
      <text x="415" y="237" fill="#D946EF" class="neon-glow-pink" font-size="12">COMPLETED</text>
    </g>

    <text x="50" y="275" class="fade-line line-4">&gt; Setting environment variables... <tspan fill="#3B82F6">OK</tspan></text>
    <text x="50" y="300" class="fade-line line-5">&gt; Loading CyberCore OS Desktop Interface...</text>
    
    <!-- System Ready -->
    <g class="fade-line line-6 pulse-glow">
      <rect x="50" y="325" width="220" height="40" rx="6" fill="#1E113A" stroke="#D946EF" stroke-width="1.5" />
      <text x="160" y="351" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="bold" letter-spacing="2">SYSTEM READY</text>
    </g>

    <!-- Command line -->
    <text x="50" y="395" class="fade-line line-6">adi-onGit@cybercore:~$ <tspan fill="#D946EF">whoami</tspan><tspan class="cursor" fill="#D946EF">█</tspan></text>
  </g>
</svg>
