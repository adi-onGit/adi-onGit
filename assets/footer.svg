<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
      
      .text-mono {
        font-family: 'Share Tech Mono', monospace;
        fill: #F8FAFC;
        font-size: 14px;
      }
      
      .neon-glow-pink {
        filter: drop-shadow(0 0 8px #D946EF) drop-shadow(0 0 15px #D946EF);
      }
      
      .fade-line {
        opacity: 0;
        animation: fadeIn 0.4s ease-out forwards;
      }
      
      .line-1 { animation-delay: 0.5s; }
      .line-2 { animation-delay: 1.2s; }
      .line-3 { animation-delay: 1.8s; }
      .line-4 { animation-delay: 2.6s; }
      .line-5 { animation-delay: 3.2s; }
      
      .progress-fill {
        width: 0%;
        animation: fillProgress 1.2s ease-in-out forwards;
        animation-delay: 1.8s;
      }
      
      .cursor {
        animation: blink 1s step-end infinite;
      }

      .shutdown-overlay {
        animation: screenDim 5.5s infinite alternate ease-in-out;
      }
      
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      
      @keyframes fillProgress {
        to { width: 344px; }
      }
      
      @keyframes blink {
        50% { opacity: 0; }
      }

      @keyframes screenDim {
        0%, 80% { opacity: 1; }
        95%, 100% { opacity: 0.05; }
      }
    </style>
    
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#140822" />
      <stop offset="100%" stop-color="#09090B" />
    </radialGradient>
    
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>

    <pattern id="scanlines" width="100" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="100" y2="0" stroke="#000" stroke-width="1.5" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background Canvas -->
  <rect width="800" height="250" fill="url(#bgGrad)" />
  <rect width="800" height="250" fill="url(#scanlines)" />

  <!-- Outer Glass Frame -->
  <rect x="20" y="20" width="760" height="210" rx="10" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.75" />

  <!-- Shutdown Sequence Content (dims out at the end of the loop) -->
  <g class="shutdown-overlay">
    <!-- Header -->
    <g class="text-mono" font-weight="bold">
      <rect x="50" y="40" width="260" height="30" rx="4" fill="#250C3D" stroke="#D946EF" stroke-width="1" class="neon-glow-pink" />
      <text x="180" y="60" text-anchor="middle" fill="#D946EF" letter-spacing="1">SYSTEM SHUTDOWN ACTIVATED</text>
    </g>

    <!-- Logging Logs -->
    <g class="text-mono">
      <text x="50" y="100" class="fade-line line-1">&gt; Unmounting local storage modules... <tspan fill="#3B82F6">SUCCESS</tspan></text>
      <text x="50" y="125" class="fade-line line-2">&gt; Saving active repositories states... <tspan fill="#3B82F6">DONE</tspan></text>
      <text x="50" y="150" class="fade-line line-3" fill="#A1A1AA">&gt; Uploading commits to github.com/adi-onGit...</text>
      
      <!-- Progress Bar -->
      <g class="fade-line line-3">
        <rect x="50" y="165" width="350" height="15" rx="3" fill="none" stroke="#7C3AED" stroke-width="1" />
        <rect x="53" y="168" width="0" height="9" rx="1.5" fill="url(#borderGrad)" class="progress-fill" />
        <text x="415" y="177" fill="#D946EF" font-size="12">COMMITTED</text>
      </g>

      <text x="50" y="205" class="fade-line line-4" fill="#06B6D4" font-weight="bold" font-size="16">
        &gt; Goodbye, User. Session Terminated. <tspan class="cursor" fill="#06B6D4">█</tspan>
      </text>
    </g>
  </g>
</svg>
