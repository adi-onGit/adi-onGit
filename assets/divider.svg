<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 30" width="100%" height="100%">
  <defs>
    <style>
      .glow-line {
        fill: none;
        stroke: url(#lineGrad);
        stroke-width: 2;
        stroke-linecap: round;
        filter: drop-shadow(0 0 2px #7C3AED);
      }
      .circuit-node {
        fill: #09090B;
        stroke: #D946EF;
        stroke-width: 1.5;
        filter: drop-shadow(0 0 4px #D946EF);
      }
      .pulse-dot {
        fill: #F8FAFC;
        filter: drop-shadow(0 0 4px #D946EF) drop-shadow(0 0 8px #7C3AED);
      }
    </style>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.1" />
      <stop offset="15%" stop-color="#7C3AED" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="85%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  
  <!-- Main circuit path -->
  <path d="M 10,15 L 350,15 L 360,25 H 440 L 450,15 L 790,15" class="glow-line" />
  
  <!-- Branching circuit path 1 -->
  <path d="M 200,15 L 210,5 H 260 L 265,10" fill="none" stroke="#7C3AED" stroke-width="1" opacity="0.6" />
  <circle cx="265" cy="10" r="1.5" fill="#7C3AED" />
  
  <!-- Branching circuit path 2 -->
  <path d="M 540,15 L 550,25 H 600 L 605,20" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.6" />
  <circle cx="605" cy="20" r="1.5" fill="#3B82F6" />

  <!-- Center Hexagon / Node -->
  <polygon points="390,10 410,10 420,15 410,20 390,20 380,15" class="circuit-node" />
  <circle cx="400" cy="15" r="2" fill="#3B82F6" />

  <!-- Pulse Dot moving along path -->
  <circle r="2.5" class="pulse-dot">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 10,15 L 350,15 L 360,25 H 440 L 450,15 L 790,15" />
  </circle>
</svg>
