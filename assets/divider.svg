<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 24" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="glow-div" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes div-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; filter: drop-shadow(0 0 1px #7C3AED); }
    }
    .anim-pulse {
      animation: div-pulse 2s infinite;
    }
  </style>

  <!-- Left Neon Track -->
  <g class="anim-pulse" filter="url(#glow-div)">
    <!-- Base track -->
    <rect x="0" y="10" width="375" height="4" fill="#7C3AED" />
    <rect x="10" y="8" width="350" height="1" fill="#A78BFA" />
    <!-- Red nodes -->
    <rect x="50" y="7" width="6" height="3" fill="#E11D48" />
    <rect x="150" y="7" width="6" height="3" fill="#E11D48" />
    <rect x="250" y="7" width="6" height="3" fill="#E11D48" />
    <rect x="350" y="7" width="6" height="3" fill="#E11D48" />
  </g>

  <!-- Center Skull -->
  <g transform="translate(388, 0)" filter="url(#glow-div)">
    <!-- Outer bounds X: 388 to 412 -->
    <!-- Skull Shape -->
    <path d="
      M 6 2 h 12 v 2 h -12 z
      M 4 4 h 16 v 2 h -16 z
      M 2 6 h 20 v 6 h -20 z
      M 4 12 h 16 v 2 h -16 z
      M 6 14 h 12 v 6 h -12 z
      M 8 20 h 8 v 2 h -8 z
    " fill="#E5E7EB" />
    <!-- Eyes -->
    <rect x="6" y="8" width="3" height="3" fill="#E11D48" />
    <rect x="15" y="8" width="3" height="3" fill="#E11D48" />
    <!-- Nose -->
    <rect x="11" y="12" width="2" height="2" fill="#110E26" />
    <!-- Teeth gaps -->
    <rect x="8" y="18" width="2" height="2" fill="#110E26" />
    <rect x="14" y="18" width="2" height="2" fill="#110E26" />
  </g>

  <!-- Right Neon Track -->
  <g class="anim-pulse" filter="url(#glow-div)" style="animation-delay: 1s;">
    <!-- Base track -->
    <rect x="425" y="10" width="375" height="4" fill="#7C3AED" />
    <rect x="440" y="8" width="350" height="1" fill="#A78BFA" />
    <!-- Red nodes -->
    <rect x="444" y="7" width="6" height="3" fill="#E11D48" />
    <rect x="544" y="7" width="6" height="3" fill="#E11D48" />
    <rect x="644" y="7" width="6" height="3" fill="#E11D48" />
    <rect x="744" y="7" width="6" height="3" fill="#E11D48" />
  </g>
</svg>
