<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <style>
      .grid-v {
        stroke: #7C3AED;
        stroke-width: 1;
        opacity: 0.65;
        filter: drop-shadow(0 0 1px #7C3AED);
      }
      .grid-h {
        stroke: #D946EF;
        stroke-width: 1.2;
        opacity: 0.85;
        filter: drop-shadow(0 0 2px #D946EF);
      }
      .horizon-glow {
        fill: url(#horizonGrad);
        opacity: 0.45;
      }
      .horizon-line {
        stroke: #3B82F6;
        stroke-width: 2;
        filter: drop-shadow(0 0 4px #3B82F6);
      }
    </style>
    
    <radialGradient id="skyBg" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#190A2E" />
      <stop offset="40%" stop-color="#09090B" />
      <stop offset="100%" stop-color="#050507" />
    </radialGradient>

    <radialGradient id="horizonGrad" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#D946EF" />
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#09090B" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#skyBg)" />

  <!-- Horizon Glow -->
  <ellipse cx="400" cy="40" rx="300" ry="60" class="horizon-glow" />

  <!-- Converging Vertical Grid Lines (Vanishing point at 400, 40) -->
  <g class="grid-v">
    <line x1="400" y1="40" x2="-200" y2="200" />
    <line x1="400" y1="40" x2="-100" y2="200" />
    <line x1="400" y1="40" x2="0" y2="200" />
    <line x1="400" y1="40" x2="100" y2="200" />
    <line x1="400" y1="40" x2="200" y2="200" />
    <line x1="400" y1="40" x2="300" y2="200" />
    <line x1="400" y1="40" x2="370" y2="200" />
    <line x1="400" y1="40" x2="400" y2="200" />
    <line x1="400" y1="40" x2="430" y2="200" />
    <line x1="400" y1="40" x2="500" y2="200" />
    <line x1="400" y1="40" x2="600" y2="200" />
    <line x1="400" y1="40" x2="700" y2="200" />
    <line x1="400" y1="40" x2="800" y2="200" />
    <line x1="400" y1="40" x2="900" y2="200" />
    <line x1="400" y1="40" x2="1000" y2="200" />
  </g>

  <!-- Horizontal Grid Lines with Perspective Acceleration -->
  <g class="grid-h">
    <!-- Line 1 -->
    <line x1="-200" y1="40" x2="1000" y2="40">
      <animate attributeName="y1" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="y2" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="0s" />
    </line>
    <!-- Line 2 -->
    <line x1="-200" y1="40" x2="1000" y2="40">
      <animate attributeName="y1" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="0.7s" />
      <animate attributeName="y2" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="0.7s" />
    </line>
    <!-- Line 3 -->
    <line x1="-200" y1="40" x2="1000" y2="40">
      <animate attributeName="y1" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="1.4s" />
      <animate attributeName="y2" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="1.4s" />
    </line>
    <!-- Line 4 -->
    <line x1="-200" y1="40" x2="1000" y2="40">
      <animate attributeName="y1" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="2.1s" />
      <animate attributeName="y2" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="2.1s" />
    </line>
    <!-- Line 5 -->
    <line x1="-200" y1="40" x2="1000" y2="40">
      <animate attributeName="y1" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="2.8s" />
      <animate attributeName="y2" values="40;45;55;70;95;130;180;240" dur="3.5s" repeatCount="indefinite" begin="2.8s" />
    </line>
  </g>

  <!-- Horizon Line -->
  <line x1="0" y1="40" x2="800" y2="40" class="horizon-line" />
</svg>
