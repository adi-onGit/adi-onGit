<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="moon-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0.5px rgba(124, 58, 237, 0.4)); opacity: 0.9; }
      50% { transform: scale(1.03); filter: drop-shadow(0 0 2px rgba(124, 58, 237, 0.9)); opacity: 1; }
    }
    .anim-moon {
      transform-origin: 16px 16px;
      animation: pulse 4s ease-in-out infinite;
    }
  </style>

  <!-- Glowing Pixel Moon -->
  <g class="anim-moon" filter="url(#moon-glow)">
    <!-- Base Shape (Circular blocky moon) -->
    <path d="
      M 11 3 h 10 v 2 h -10 z
      M 8 5 h 16 v 2 h -16 z
      M 6 7 h 20 v 2 h -20 z
      M 5 9 h 22 v 2 h -22 z
      M 4 11 h 24 v 10 h -24 z
      M 5 21 h 22 v 2 h -22 z
      M 6 23 h 20 v 2 h -20 z
      M 8 25 h 16 v 2 h -16 z
      M 11 27 h 10 v 2 h -10 z
    " fill="#E2E8F0" />

    <!-- Shading (Craters and shadow details) -->
    <!-- Darker spots (Slate gray) -->
    <!-- Large Crater Left -->
    <path d="M 8 11 h 4 v 4 h -4 z M 9 10 h 2 v 6 h -2 z" fill="#CBD5E1" />
    <path d="M 9 12 h 2 v 2 h -2 z" fill="#94A3B8" /> <!-- Inner depth -->

    <!-- Medium Crater Right Top -->
    <path d="M 20 8 h 3 v 3 h -3 z" fill="#CBD5E1" />
    <path d="M 21 9 h 1 v 1 h -1 z" fill="#94A3B8" />

    <!-- Small Crater Right Bottom -->
    <path d="M 22 17 h 4 v 2 h -4 z" fill="#CBD5E1" />
    
    <!-- Long Shadow edge on left/bottom side -->
    <path d="
      M 11 27 h 10 v 1 h -10 z
      M 8 25 h 13 v 1 h -13 z
      M 6 23 h 12 v 1 h -12 z
      M 5 21 h 9 v 1 h -9 z
      M 4 17 h 7 v 4 h -7 z
      M 4 13 h 4 v 4 h -4 z
    " fill="#94A3B8" opacity="0.5" />
    
    <!-- Cyber Neon Tint (gives that Code Kombat arcade feel) -->
    <path d="M 12 3 h 8 v 1 h -8 z M 9 5 h 14 v 1 h -14 z M 7 7 h 18 v 1 h -18 z" fill="#7C3AED" opacity="0.3" />
  </g>
</svg>
