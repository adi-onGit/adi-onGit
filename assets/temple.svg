<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05050A" />
      <stop offset="50%" stop-color="#09090F" />
      <stop offset="100%" stop-color="#140F2D" />
    </linearGradient>
    <linearGradient id="pillar-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1A1829" />
      <stop offset="50%" stop-color="#2D2845" />
      <stop offset="100%" stop-color="#151221" />
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sky Background -->
  <rect x="0" y="0" width="320" height="180" fill="url(#bg-grad)" />

  <!-- Mountain Silhouette (Far Background) -->
  <path d="M 0 120 L 40 90 L 80 110 L 130 75 L 180 115 L 240 80 L 290 105 L 320 90 L 320 150 L 0 150 Z" fill="#0C0A1A" />
  <!-- Distant Peak Details -->
  <path d="M 40 90 L 48 98 L 35 105 Z M 130 75 L 140 88 L 120 95 Z M 240 80 L 248 90 L 230 100 Z" fill="#15112B" />

  <!-- Temple Wall Grid Pattern (Mid Background) -->
  <g stroke="#1F1A3A" stroke-width="0.5" opacity="0.3">
    <!-- Horizontal wall brick lines -->
    <line x1="0" y1="60" x2="320" y2="60" />
    <line x1="0" y1="80" x2="320" y2="80" />
    <line x1="0" y1="100" x2="320" y2="100" />
    <line x1="0" y1="120" x2="320" y2="120" />
    <line x1="0" y1="140" x2="320" y2="140" />
  </g>

  <!-- Central Pagoda/Arch (Behind the Fighter) -->
  <g transform="translate(110, 30)">
    <!-- Arch Pillars -->
    <rect x="10" y="40" width="12" height="80" fill="url(#pillar-grad)" />
    <rect x="78" y="40" width="12" height="80" fill="url(#pillar-grad)" />
    
    <!-- Arch Roof (Pagoda style) -->
    <path d="M 0 40 L 50 20 L 100 40 L 95 45 L 50 28 L 5 45 Z" fill="#E11D48" />
    <path d="M 15 28 L 50 10 L 85 28 L 80 32 L 50 17 L 20 32 Z" fill="#7C3AED" />
    <!-- Center Jewel -->
    <polygon points="50,5 54,11 50,17 46,11" fill="#FF6B00" filter="url(#neon-glow)" />

    <!-- Stone Brick details on Arch -->
    <rect x="10" y="50" width="12" height="4" fill="#3D355C" />
    <rect x="78" y="55" width="12" height="4" fill="#3D355C" />
    <rect x="10" y="80" width="12" height="4" fill="#3D355C" />
    <rect x="78" y="85" width="12" height="4" fill="#3D355C" />
  </g>

  <!-- Glowing Neon Arena Lines -->
  <path d="M 0 145 H 320" stroke="#7C3AED" stroke-width="2" filter="url(#neon-glow)" />
  <path d="M 0 155 H 320" stroke="#E11D48" stroke-width="1.5" filter="url(#neon-glow)" />

  <!-- Side Pillars (Foreground) -->
  <!-- Left Pillar -->
  <g transform="translate(15, 20)">
    <rect x="0" y="10" width="20" height="135" fill="url(#pillar-grad)" stroke="#110E26" stroke-width="1" />
    <!-- Pillar Cap -->
    <rect x="-4" y="0" width="28" height="10" fill="#E11D48" />
    <rect x="-2" y="4" width="24" height="6" fill="#FF6B00" />
    <!-- Carved details -->
    <rect x="4" y="25" width="12" height="15" fill="#110E26" />
    <rect x="6" y="27" width="8" height="11" fill="#7C3AED" opacity="0.8" filter="url(#neon-glow)" />
    
    <rect x="4" y="60" width="12" height="15" fill="#110E26" />
    <rect x="6" y="62" width="8" height="11" fill="#7C3AED" opacity="0.8" filter="url(#neon-glow)" />

    <rect x="4" y="95" width="12" height="15" fill="#110E26" />
    <rect x="6" y="97" width="8" height="11" fill="#7C3AED" opacity="0.8" filter="url(#neon-glow)" />
    
    <!-- Base -->
    <rect x="-2" y="140" width="24" height="10" fill="#1A1829" stroke="#110E26" />
  </g>

  <!-- Right Pillar -->
  <g transform="translate(285, 20)">
    <rect x="0" y="10" width="20" height="135" fill="url(#pillar-grad)" stroke="#110E26" stroke-width="1" />
    <!-- Pillar Cap -->
    <rect x="-4" y="0" width="28" height="10" fill="#E11D48" />
    <rect x="-2" y="4" width="24" height="6" fill="#FF6B00" />
    <!-- Carved details -->
    <rect x="4" y="25" width="12" height="15" fill="#110E26" />
    <rect x="6" y="27" width="8" height="11" fill="#7C3AED" opacity="0.8" filter="url(#neon-glow)" />

    <rect x="4" y="60" width="12" height="15" fill="#110E26" />
    <rect x="6" y="62" width="8" height="11" fill="#7C3AED" opacity="0.8" filter="url(#neon-glow)" />

    <rect x="4" y="95" width="12" height="15" fill="#110E26" />
    <rect x="6" y="97" width="8" height="11" fill="#7C3AED" opacity="0.8" filter="url(#neon-glow)" />
    
    <!-- Base -->
    <rect x="-2" y="140" width="24" height="10" fill="#1A1829" stroke="#110E26" />
  </g>

  <!-- Ground Floor (Isometric Tiled Arena Floor) -->
  <polygon points="0,150 320,150 320,180 0,180" fill="#0C091A" />
  <path d="M 0 150 L 0 180 M 40 150 L 20 180 M 80 150 L 70 180 M 120 150 L 120 180 M 160 150 L 170 180 M 200 150 L 220 180 M 240 150 L 270 180 M 280 150 L 320 180" stroke="#1B153D" stroke-width="1" />
  <line x1="0" y1="160" x2="320" y2="160" stroke="#1B153D" stroke-width="1" />
  <line x1="0" y1="170" x2="320" y2="170" stroke="#1B153D" stroke-width="1" />
</svg>
