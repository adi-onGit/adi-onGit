<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 300" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .panel-title {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #FF6B00;
      letter-spacing: 2px;
    }
    .connect-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      fill: #E5E7EB;
      font-size: 11px;
    }
    .connect-text-hover {
      fill: #A78BFA;
    }
    .tagline-text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: 900;
      fill: #FF6B00;
      font-size: 12px;
      letter-spacing: 1px;
    }
    @keyframes lightning-flash {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .bolt-flash {
      animation: lightning-flash 1.5s infinite;
    }
  </style>

  <!-- Panel Border/Frame -->
  <rect x="5" y="5" width="340" height="290" fill="#090715" stroke="#7C3AED" stroke-width="3" rx="8" filter="url(#neon-glow)" />
  <rect x="10" y="10" width="330" height="280" fill="#0C0A1F" rx="5" />
  
  <!-- Corner studs -->
  <rect x="8" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="8" width="4" height="4" fill="#E11D48" />
  <rect x="8" y="288" width="4" height="4" fill="#E11D48" />
  <rect x="338" y="288" width="4" height="4" fill="#E11D48" />

  <!-- Panel Title -->
  <text x="175" y="35" class="panel-title" font-size="16" text-anchor="middle" filter="url(#neon-glow)">CONNECT</text>
  <line x1="25" y1="45" x2="325" y2="45" stroke="#7C3AED" stroke-width="2" />

  <!-- SOCIAL LINKS (X=30, Y starts at 65) -->
  <!-- 1. LinkedIn -->
  <g transform="translate(30, 65)">
    <!-- LinkedIn pixel icon -->
    <rect x="0" y="0" width="16" height="16" fill="#0077B5" />
    <path d="M 3 6 h 2 v 7 h -2 z M 3 2 h 2 v 2 h -2 z" fill="#FFFFFF" />
    <path d="M 7 6 h 2 v 1.5 h 0.1 C 9.5 6.5, 10.5 5.8, 11.8 5.8 C 13.8 5.8, 14 7.2, 14 9 v 4 h -2.3 v -3.5 C 11.7 8.5, 11 8, 10.3 8 C 9.5 8, 9.2 8.6, 9.2 9.5 v 3.5 h -2.2 z" fill="#FFFFFF" />
    <text x="28" y="12" class="connect-text connect-text-hover">aditya-mohanty</text>
  </g>

  <!-- 2. GitHub -->
  <g transform="translate(30, 105)">
    <!-- GitHub/Octocat shape -->
    <rect x="0" y="0" width="16" height="16" fill="#4B5563" />
    <path d="M 8 2 a 6 6 0 0 0 -6 6 c 0 3.3, 2.2 6.2, 5.2 7 v -1.3 C 5.5 14, 5 13.5, 4.8 12.8 C 4.5 12, 4 11.8, 4 11.8 C 3.4 11.4, 4 11.4, 4 11.4 C 4.7 11.5, 5 12, 5 12 C 5.6 13, 6.5 12.8, 6.8 12.6 C 6.9 12.1, 7.1 11.7, 7.3 11.5 C 5.2 11.3, 3 10.5, 3 7 C 3 6, 3.4 5.2, 4 4.5 C 3.9 4.3, 3.5 3.3, 4.1 2 C 4.1 2, 5 2.3, 6.8 3.5 C 7.6 3.3, 8.4 3.2, 9.2 3.2 C 10 3.2, 10.8 3.3, 11.6 3.5 C 13.4 2.3, 14.3 2, 14.3 2 C 14.9 3.3, 14.5 4.3, 14.4 4.5 C 15 5.2, 15.3 6, 15.3 7 C 15.3 10.5, 13.1 11.3, 11 11.5 C 11.3 11.8, 11.6 12.4, 11.6 13.3 v 2 c 3 -0.8, 5.2 -3.7, 5.2 -7 a 6 6 0 0 0 -6 -6 z" fill="#FFFFFF" />
    <text x="28" y="12" class="connect-text">adi-onGit</text>
  </g>

  <!-- 3. Email -->
  <g transform="translate(30, 145)">
    <!-- Email pixel envelope -->
    <rect x="0" y="2" width="16" height="12" fill="#E11D48" />
    <path d="M 0 2 L 8 8 L 16 2" stroke="#FFFFFF" stroke-width="1.5" fill="none" />
    <text x="28" y="12" class="connect-text">adi.on.git@gmail.com</text>
  </g>

  <!-- 4. X (Twitter) -->
  <g transform="translate(30, 185)">
    <!-- X logo -->
    <rect x="0" y="0" width="16" height="16" fill="#110E26" stroke="#4B5563" stroke-width="1.2" />
    <path d="M 2 2 L 7 8 L 2 14 M 14 2 L 9 8 L 14 14 M 6 7 L 10 9" stroke="#FFFFFF" stroke-width="1.5" fill="none" />
    <text x="28" y="12" class="connect-text">@adi_onGit</text>
  </g>

  <!-- Divider inside panel -->
  <line x1="25" y1="215" x2="325" y2="215" stroke="#7C3AED" stroke-dasharray="4 4" stroke-width="1" />

  <!-- Tagline "Let's build together!" -->
  <g transform="translate(175, 250)" class="bolt-flash" filter="url(#neon-glow)">
    <!-- Yellow/Orange Lightning Bolt -->
    <path d="M -125 -10 L -120 -2 L -125 -2 L -122 8 L -127 8 L -122 18 L -125 18" stroke="#FF6B00" stroke-width="2" fill="none" />
    <text x="0" y="5" class="tagline-text" text-anchor="middle">Let's build together!</text>
  </g>
</svg>
