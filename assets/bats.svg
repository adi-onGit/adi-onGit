<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" shape-rendering="crispEdges">
  <style>
    @keyframes bat-fly-1 {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-8px, -4px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes bat-fly-2 {
      0% { transform: translate(0, 0); }
      50% { transform: translate(6px, -5px); }
      100% { transform: translate(0, 0); }
    }
    @keyframes flap-1 {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes flap-2 {
      0%, 49% { opacity: 0; }
      50%, 100% { opacity: 1; }
    }
    .anim-bat-1 {
      animation: bat-fly-1 3.5s ease-in-out infinite;
    }
    .anim-bat-2 {
      animation: bat-fly-2 4.2s ease-in-out infinite;
    }
    .wing-up {
      animation: flap-1 0.3s steps(1) infinite;
    }
    .wing-down {
      animation: flap-2 0.3s steps(1) infinite;
    }
  </style>

  <!-- Bat 1 (Large) -->
  <g class="anim-bat-1" transform="translate(10, 15)">
    <!-- Wing Up State -->
    <g class="wing-up">
      <!-- Body -->
      <rect x="7" y="4" width="2" height="4" fill="#0C091A" />
      <rect x="8" y="2" width="1" height="2" fill="#E11D48" /> <!-- red head/ears -->
      <!-- Left Wing Up -->
      <path d="M 0 0 h 2 v 2 h 2 v 2 h 3 v 2 h -2 v -2 h -3 v -2 h -2 z" fill="#1C1A2B" />
      <!-- Right Wing Up -->
      <path d="M 9 4 h 3 v -2 h 2 v -2 h 2 v 4 h -2 v 2 h -3 v 2 h -2 z" fill="#1C1A2B" />
    </g>
    <!-- Wing Down State -->
    <g class="wing-down">
      <!-- Body -->
      <rect x="7" y="4" width="2" height="4" fill="#0C091A" />
      <rect x="8" y="2" width="1" height="2" fill="#E11D48" />
      <!-- Left Wing Down -->
      <path d="M 1 6 h 2 v -2 h 2 v -2 h 2 v 4 h -2 v 2 h -3 v -1 z" fill="#1C1A2B" />
      <!-- Right Wing Down -->
      <path d="M 9 2 h 2 v 2 h 2 v 2 h 2 v -1 h -3 v -2 h -2 v -2 z" fill="#1C1A2B" />
    </g>
  </g>

  <!-- Bat 2 (Small, offset) -->
  <g class="anim-bat-2" transform="translate(38, 28) scale(0.7)">
    <g class="wing-up" style="animation-delay: 0.15s;">
      <rect x="7" y="4" width="2" height="4" fill="#0C091A" />
      <rect x="8" y="3" width="1" height="1" fill="#E11D48" />
      <path d="M 1 1 h 2 v 2 h 2 v 2 h 2 v 2 h -2 v -2 h -2 v -2 h -2 z" fill="#1B172E" />
      <path d="M 9 5 h 2 v -2 h 2 v -2 h 2 v 4 h -2 v 2 h -2 v 2 h -2 z" fill="#1B172E" />
    </g>
    <g class="wing-down" style="animation-delay: 0.15s;">
      <rect x="7" y="4" width="2" height="4" fill="#0C091A" />
      <rect x="8" y="3" width="1" height="1" fill="#E11D48" />
      <path d="M 2 5 h 2 v -2 h 2 v -2 h 1 v 4 h -2 v 2 h -2 z" fill="#1B172E" />
      <path d="M 9 1 h 2 v 2 h 2 v 2 h 1 v -1 h -2 v -2 h -2 z" fill="#1B172E" />
    </g>
  </g>
</svg>
