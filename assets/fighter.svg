<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <!-- Shadow Filter for glowing eyes -->
    <filter id="eye-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    @keyframes breathe {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-1.5px); }
    }
    @keyframes arms-idle {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-0.8px) rotate(-1deg); }
    }
    @keyframes blink {
      0%, 45%, 55%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }
    @keyframes shadow-pulse {
      0%, 100% { transform: scaleX(1); opacity: 0.6; }
      50% { transform: scaleX(1.05); opacity: 0.8; }
    }
    .anim-shadow {
      transform-origin: 32px 58px;
      animation: shadow-pulse 3s ease-in-out infinite;
    }
    .anim-legs {
      /* Legs stay planted */
    }
    .anim-torso {
      transform-origin: 32px 48px;
      animation: breathe 3s ease-in-out infinite;
    }
    .anim-arms {
      transform-origin: 32px 32px;
      animation: arms-idle 3s ease-in-out infinite;
    }
    .anim-eyes {
      transform-origin: 32px 20px;
      animation: blink 5s infinite;
    }
  </style>

  <!-- Ground Shadow -->
  <ellipse cx="32" cy="58" rx="14" ry="3.5" fill="#020205" class="anim-shadow" />

  <!-- LEGS (Stay planted on ground) -->
  <g class="anim-legs">
    <!-- Left Leg/Boot -->
    <path d="M 22 46 h 4 v 4 h -4 z M 20 50 h 4 v 4 h -4 z M 17 54 h 6 v 3 h -6 z" fill="#1F1A3A" />
    <path d="M 22 50 h 2 v 4 h -2 z" fill="#7C3AED" />
    <!-- Right Leg/Boot -->
    <path d="M 38 46 h 4 v 4 h -4 z M 40 50 h 4 v 4 h -4 z M 41 54 h 6 v 3 h -6 z" fill="#1F1A3A" />
    <path d="M 40 50 h 2 v 4 h -2 z" fill="#7C3AED" />
  </g>

  <!-- TORSO & HEAD (Breathing group) -->
  <g class="anim-torso">
    <!-- Waist & Belt -->
    <path d="M 24 42 h 16 v 4 h -16 z" fill="#110E26" />
    <path d="M 26 43 h 12 v 2 h -12 z" fill="#E11D48" /> <!-- Red sash -->
    <path d="M 31 42 h 2 v 4 h -2 z" fill="#FF6B00" /> <!-- Belt buckle gold/orange -->

    <!-- Chest & Shoulders -->
    <path d="M 22 28 h 20 v 14 h -20 z" fill="#1F1A3A" />
    <!-- Chest Vest Highlights -->
    <path d="M 26 28 h 12 v 6 h -12 z" fill="#2E2559" />
    <path d="M 29 28 h 6 v 3 h -6 z" fill="#7C3AED" />
    <!-- Purple Gi Wrap lines -->
    <path d="M 25 32 h 2 v 10 h -2 z M 37 32 h 2 v 10 h -2 z" fill="#7C3AED" />

    <!-- Head & Mask -->
    <path d="M 24 12 h 16 v 16 h -16 z" fill="#1F1A3A" /> <!-- Base Head -->
    <path d="M 26 14 h 12 v 12 h -12 z" fill="#7C3AED" /> <!-- Outer cowl -->
    <path d="M 28 16 h 8 v 8 h -8 z" fill="#4C1D95" /> <!-- Inner cowl shadow -->
    <path d="M 27 18 h 10 v 4 h -10 z" fill="#110E26" /> <!-- Mask face cutout -->
    
    <!-- Blinking Glowing Eyes -->
    <g class="anim-eyes">
      <rect x="29" y="19" width="2" height="1" fill="#FF6B00" filter="url(#eye-glow)" />
      <rect x="33" y="19" width="2" height="1" fill="#FF6B00" filter="url(#eye-glow)" />
      <rect x="30" y="19" width="1" height="1" fill="#FFFFFF" />
      <rect x="34" y="19" width="1" height="1" fill="#FFFFFF" />
    </g>

    <!-- Head Bandana Tails (flowing behind) -->
    <path d="M 20 14 h 4 v 4 h -4 z M 18 16 h 3 v 3 h -3 z M 15 18 h 4 v 3 h -4 z" fill="#4C1D95" />
    <path d="M 19 15 h 2 v 2 h -2 z M 17 17 h 2 v 2 h -2 z" fill="#7C3AED" />
  </g>

  <!-- ARMS & WEAPONS/GLOVES (Separate group to allow subtle movement) -->
  <g class="anim-arms">
    <!-- Left Arm (Ready stance) -->
    <path d="M 18 28 h 5 v 4 h -5 z M 16 32 h 4 v 4 h -4 z M 14 36 h 4 v 4 h -4 z" fill="#1F1A3A" />
    <path d="M 13 38 h 4 v 4 h -4 z" fill="#7C3AED" /> <!-- Glove -->
    <path d="M 12 39 h 3 v 3 h -3 z" fill="#E11D48" /> <!-- Fist wrap red -->

    <!-- Right Arm -->
    <path d="M 41 28 h 5 v 4 h -5 z M 44 32 h 4 v 4 h -4 z M 46 36 h 4 v 4 h -4 z" fill="#1F1A3A" />
    <path d="M 47 38 h 4 v 4 h -4 z" fill="#7C3AED" /> <!-- Glove -->
    <path d="M 49 39 h 3 v 3 h -3 z" fill="#E11D48" /> <!-- Fist wrap red -->

    <!-- Cyber Keyboard Weapon (Glows and floats in right hand) -->
    <g transform="translate(42, 28) rotate(-15)">
      <!-- Board -->
      <rect x="-2" y="2" width="14" height="5" rx="1" fill="#110E26" stroke="#7C3AED" stroke-width="0.75" />
      <!-- Glowing Keys -->
      <rect x="0" y="3.5" width="2" height="2" fill="#FF6B00" />
      <rect x="3" y="3.5" width="2" height="2" fill="#E11D48" />
      <rect x="6" y="3.5" width="2" height="2" fill="#7C3AED" />
      <rect x="9" y="3.5" width="2" height="2" fill="#22C55E" />
    </g>
  </g>
</svg>
