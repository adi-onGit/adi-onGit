<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="fire-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes flicker {
      0%, 100% { transform: scale(1) translateY(0); }
      25% { transform: scale(1.08, 0.92) translateY(0.5px); }
      50% { transform: scale(0.92, 1.08) translateY(-0.5px); }
      75% { transform: scale(1.03, 0.97) translateY(0.2px); }
    }
    @keyframes spark-upward-left {
      0% { transform: translate(0, 0); opacity: 1; }
      80% { opacity: 0.8; }
      100% { transform: translate(-3px, -24px); opacity: 0; }
    }
    @keyframes spark-upward-right {
      0% { transform: translate(0, 0); opacity: 1; }
      80% { opacity: 0.8; }
      100% { transform: translate(4px, -20px); opacity: 0; }
    }
    .anim-flame {
      transform-origin: 16px 28px;
      animation: flicker 0.2s infinite;
    }
    .anim-spark-l {
      transform-origin: 14px 18px;
      animation: spark-upward-left 1.4s infinite ease-out;
    }
    .anim-spark-r {
      transform-origin: 18px 18px;
      animation: spark-upward-right 1.1s infinite 0.5s ease-out;
    }
  </style>

  <!-- Torch Handle and Bracket (Wall Mounted) -->
  <!-- Iron mount -->
  <rect x="12" y="30" width="8" height="4" fill="#2D2D3A" />
  <rect x="14" y="34" width="4" height="12" fill="#1C1C24" />
  <!-- Gold ring -->
  <rect x="13" y="32" width="6" height="2" fill="#D97706" />

  <!-- Flame (Glowing Pixel Flame) -->
  <g class="anim-flame" filter="url(#fire-glow)">
    <!-- Outer Red Flame -->
    <path d="
      M 14 12 h 4 v 2 h -4 z
      M 12 14 h 8 v 2 h -8 z
      M 11 16 h 10 v 6 h -10 z
      M 12 22 h 8 v 4 h -8 z
      M 14 26 h 4 v 2 h -4 z
    " fill="#E11D48" />

    <!-- Mid Orange Flame -->
    <path d="
      M 15 15 h 2 v 2 h -2 z
      M 13 17 h 6 v 4 h -6 z
      M 14 21 h 4 v 4 h -4 z
    " fill="#FF6B00" />

    <!-- Inner Yellow Core -->
    <path d="
      M 15 19 h 2 v 4 h -2 z
    " fill="#FBBF24" />
  </g>

  <!-- Rising Sparks/Embers -->
  <rect x="13" y="14" width="1" height="1" fill="#FF6B00" class="anim-spark-l" />
  <rect x="17" y="15" width="1.5" height="1.5" fill="#FBBF24" class="anim-spark-r" />
</svg>
