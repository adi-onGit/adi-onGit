<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <style>
    .bat-shape { fill: #333; }
    .bat-eye { fill: #fff; }
    
    @media (prefers-color-scheme: dark) {
      .bat-shape { fill: #e6edf3; }
      .bat-eye { fill: #0d1117; }
    }
    
    .frame-1 { animation: flap1 0.4s steps(1) infinite; }
    .frame-2 { animation: flap2 0.4s steps(1) infinite; opacity: 0; }
    
    @keyframes flap1 { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes flap2 { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  </style>
  <g class="frame-1">
    <path class="bat-shape" d="M12 10h8v10h2v2h-12v-2h2v-10zM12 6h2v4h-2zM18 6h2v4h-2z"/>
    <path class="bat-shape" d="M8 4h2v12h-2zM6 2h2v12h-2zM4 2h2v10h-2zM22 4h2v12h-2zM24 2h2v12h-2zM26 2h2v10h-2z"/>
    <path class="bat-eye" d="M13 12h2v2h-2zM17 12h2v2h-2z"/>
  </g>
  <g class="frame-2">
    <path class="bat-shape" d="M12 10h8v10h2v2h-12v-2h2v-10zM12 6h2v4h-2zM18 6h2v4h-2z"/>
    <path class="bat-shape" d="M8 14h2v12h-2zM6 16h2v12h-2zM4 18h2v10h-2zM22 14h2v12h-2zM24 16h2v12h-2zM26 18h2v10h-2z"/>
    <path class="bat-eye" d="M13 12h2v2h-2zM17 12h2v2h-2z"/>
  </g>
</svg>
